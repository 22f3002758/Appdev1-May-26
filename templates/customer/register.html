<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer-Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <h3 class="text-center mb-5"> Customer Register</h3>
    <div class="d-flex justify-content-center">
        <div class="card" style="width: 18rem;">
        <div class="card-body">
            <form method="post" action=/register?role=customer>
                <div class="mb-3">
                    <label for="cust-name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="cust-name" aria-describedby="emailHelp" required name="cust_name">
                    
                </div>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required name="cust_email">
                    
                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1" required name="cust_pwd">
                </div>
                <div class="mb-3">
                    <label for="cust-phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="cust-phone" aria-describedby="emailHelp" required name="cust_mobile">
                </div>
                <div class="mb-3">
                    <label for="cust-add" class="form-label">Address</label>
                    <input type="text" class="form-control" id="cust-add" aria-describedby="emailHelp" required name="cust_address">
                    
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>

        </div>
    </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
