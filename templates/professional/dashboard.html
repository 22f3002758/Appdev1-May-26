<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Homeease</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"

                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">

    <div class="card" ms-3 me-3 mt-3">
        <div class="card-header">
            <div class="'d-flex d-inline">
                <h4>Packages</h4>
                <!-- Button trigger modal -->
                <button type="button" class="btn btn-primary ms-auto" data-bs-toggle="modal"
                    data-bs-target="#exampleModal">
                    Add Package
                </button>

                <!-- Modal -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <form>
                                    <div class="mb-3">
                                        <label for="exampleInputtitle" class="form-label">Title</label>
                                        <input type="text" class="form-control" id="exampleInputtitle"
                                            aria-describedby="emailHelp" required name="title">

                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInputdesc" class="form-label">Description</label>
                                        <input type="text" class="form-control" id="exampleInputdesc"
                                            aria-describedby="emailHelp" required name="description">

                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInput" clapricess="form-label">Price</label>
                                        <input type="text" class="form-control" id="exampleInputprice"
                                            aria-describedby="emailHelp" required name="price">
                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInputsd" class="form-label">Start date</label>
                                        <input type="date" class="form-control" id="exampleInputsd"
                                            aria-describedby="emailHelp" required name="start_date">

                                    </div>
                                    <div class="mb-3">
                                        <label for="exampleInputed" class="form-label">End date</label>
                                        <input type="date" class="form-control" id="exampleInputed"
                                            aria-describedby="emailHelp" required name="end_date">

                                    </div>
                                    <button type="submit" class="btn btn-primary">Submit</button>
                                </form>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="" col>
                <div class="card" style="width: 18rem;">

                    <div class="card-body">
                        <h5 class="card-title text-center">Home Cleaning</h5>
                        <p class="card-text"><strong>Description:</strong></p>
                        <p class="card-text"><strong>Price:</strong></p>
                        <p class="card-text"><strong>Start Date:</strong></p>
                        <p class="card-text"><strong>End Date:</strong></p>
                        <!-- Button trigger modal -->
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">
                            Edit
                        </button>

                        <!-- Modal -->
                        <div class="modal fade" id="editpack{{id}}" tabindex="-1" aria-labelledby="exampleModalLabel"
                            aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form>
                                            <div class="mb-3">
                                                <label for="exampleInputtitle" class="form-label">Title</label>
                                                <input type="text" class="form-control" id="exampleInputtitle"
                                                    aria-describedby="emailHelp" required name="title">

                                            </div>
                                            <div class="mb-3">
                                                <label for="exampleInputdesc" class="form-label">Description</label>
                                                <input type="text" class="form-control" id="exampleInputdesc"
                                                    aria-describedby="emailHelp" required name="description">

                                            </div>
                                            <div class="mb-3">
                                                <label for="exampleInput" clapricess="form-label">Price</label>
                                                <input type="text" class="form-control" id="exampleInputprice"
                                                    aria-describedby="emailHelp" required name="price">
                                            </div>
                                            <div class="mb-3">
                                                <label for="exampleInputsd" class="form-label">Start date</label>
                                                <input type="date" class="form-control" id="exampleInputsd"
                                                    aria-describedby="emailHelp" required name="start_date">

                                            </div>
                                            <div class="mb-3">
                                                <label for="exampleInputed" class="form-label">End date</label>
                                                <input type="date" class="form-control" id="exampleInputed"
                                                    aria-describedby="emailHelp" required name="end_date">

                                            </div>
                                            <button type="submit" class="btn btn-primary">Submit</button>
                                        </form>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary"
                                            data-bs-dismiss="modal">Close</button>
                                        <button type="button" class="btn btn-primary">Save changes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
    </div>
